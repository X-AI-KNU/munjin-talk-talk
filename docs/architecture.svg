  <text x="1412" y="365" text-anchor="middle" class="small">환자 확인용 transcript 생성</text>

  <rect x="1360" y="455" width="105" height="105" fill="#db2777" stroke="#be185d" />
  <text x="1412" y="508" class="icon" style="font-size:17px">Bedrock</text>
  <text x="1412" y="588" text-anchor="middle" class="label">Amazon Bedrock</text>
  <text x="1412" y="610" text-anchor="middle" class="small">Nova Pro / Nova Lite</text>
  <text x="1412" y="630" text-anchor="middle" class="small">의미 분할 · 표준화 · 검토</text>

  <rect x="1130" y="680" width="105" height="105" fill="#2563eb" stroke="#1d4ed8" />
  <text x="1182" y="733" class="icon" style="font-size:28px">DB</text>
  <text x="1182" y="813" text-anchor="middle" class="label">DynamoDB</text>
  <text x="1182" y="835" text-anchor="middle" class="small">MunjinSessions</text>
