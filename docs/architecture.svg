  <text x="895" y="465" text-anchor="middle" class="label">AWS Lambda Python 3.12</text>
  <text x="895" y="487" text-anchor="middle" class="small">문진 오케스트레이션</text>
  <text x="895" y="507" text-anchor="middle" class="small">Bedrock 호출 / 검증 / 저장</text>

  <rect x="835" y="570" width="245" height="78" rx="8" fill="#fff1f2" stroke="#e11d48" />
