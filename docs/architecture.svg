<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 800 34px Arial, sans-serif; fill: #0f2347; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #64748b; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .laneTitle { font: 800 20px Arial, sans-serif; fill: #0f2347; }
      .box { fill: #ffffff; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .boxGreen { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .boxOrange { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 14; }
      .boxPink { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; rx: 14; }
      .boxPurple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .boxBlue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .label { font: 800 16px Arial, sans-serif; fill: #0f2347; }
      .small { font: 600 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Arial, sans-serif; fill: #64748b; }
      .warn { font: 800 14px Arial, sans-serif; fill: #b45309; }
      .arrow { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowGreen { stroke: #16a34a; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .arrowGray { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1040"/>
  <text class="title" x="50" y="62">문진톡톡 MVP Architecture</text>
  <text class="subtitle" x="50" y="92">고령 환자 음성 문진 → LangGraph/LangChain 기반 구조화 → 의료진 원페이퍼 → 환자 안내문</text>

  <rect class="lane" x="40" y="130" width="300" height="790"/>
  <text class="laneTitle" x="70" y="172">1. 사용자 화면</text>

  <rect class="box" x="70" y="205" width="240" height="94"/>
  <text class="label" x="92" y="238">직원 접수</text>
  <text class="small" x="92" y="263">/staff</text>
  <text class="tiny" x="92" y="285">세션 생성, 초진/재진, 대기열</text>

  <rect class="boxBlue" x="70" y="325" width="240" height="118"/>
  <text class="label" x="92" y="358">환자 태블릿</text>
  <text class="small" x="92" y="383">/patient/:sessionId</text>
  <text class="tiny" x="92" y="405">서비스 이용 동의</text>
  <text class="tiny" x="92" y="425">실시간 음성 문진, 직접 수정</text>

  <rect class="boxOrange" x="70" y="470" width="240" height="118"/>
  <text class="label" x="92" y="503">의료진 화면</text>
  <text class="small" x="92" y="528">/doctor/queue, /doctor/:id</text>
  <text class="tiny" x="92" y="550">원페이퍼, 새로고침</text>
  <text class="tiny" x="92" y="570">AI 재검토, 답변 작성</text>

  <rect class="boxGreen" x="70" y="615" width="240" height="104"/>
  <text class="label" x="92" y="648">환자 안내문</text>
  <text class="small" x="92" y="673">/guide/:sessionId</text>
  <text class="tiny" x="92" y="695">안내문 확인, TTS, 출력</text>

  <rect class="lane" x="380" y="130" width="260" height="790"/>
  <text class="laneTitle" x="410" y="172">2. 프론트 호스팅</text>

  <rect class="boxBlue" x="410" y="235" width="200" height="112"/>
  <text class="label" x="435" y="270">AWS Amplify</text>
  <text class="small" x="435" y="295">React + Vite SPA</text>
  <text class="tiny" x="435" y="318">HTTPS 배포</text>

  <rect class="box" x="410" y="385" width="200" height="126"/>
  <text class="label" x="435" y="420">브라우저 STT</text>
  <text class="small" x="435" y="445">WebSocket streaming</text>
  <text class="tiny" x="435" y="468">음성 파일 업로드 없음</text>
  <text class="tiny" x="435" y="490">확정 텍스트만 API 전송</text>

  <rect class="lane" x="680" y="130" width="420" height="790"/>
  <text class="laneTitle" x="710" y="172">3. 서버리스 API / 파이프라인</text>

  <rect class="boxPurple" x="720" y="205" width="330" height="86"/>
  <text class="label" x="750" y="238">API Gateway HTTP API</text>
  <text class="tiny" x="750" y="263">/sessions, /process-answer, /onepager, /doctor-response</text>

  <rect class="boxOrange" x="720" y="320" width="330" height="92"/>
  <text class="label" x="750" y="354">AWS Lambda Python 3.12</text>
  <text class="tiny" x="750" y="379">handler.py, sessions.py, guide.py, onepager.py</text>

  <rect class="boxBlue" x="720" y="445" width="330" height="246"/>
  <text class="label" x="750" y="480">LangGraph StateGraph</text>
  <text class="tiny" x="750" y="505">input → safety → RAG → LLM extraction</text>
  <text class="tiny" x="750" y="528">Pydantic/source_quote validator</text>
  <text class="tiny" x="750" y="551">검증 실패 시 bounded retry loop</text>
  <text class="tiny" x="750" y="574">Hybrid IR → artifact 저장 → response</text>
  <text class="warn" x="750" y="610">rule-based extraction 대체 없음</text>
  <text class="tiny" x="750" y="635">최소 active_path와 node event trace</text>
  <text class="tiny" x="750" y="658">의료진 AI 재검토는 onepager review route</text>

  <rect class="boxGreen" x="720" y="725" width="330" height="100"/>
  <text class="label" x="750" y="760">LangChain Runnable Node</text>
  <text class="tiny" x="750" y="785">ChatPromptTemplate → Bedrock Runnable</text>
  <text class="tiny" x="750" y="808">JsonOutputParser → Pydantic schema</text>

  <rect class="lane" x="1140" y="130" width="410" height="790"/>
  <text class="laneTitle" x="1170" y="172">4. AWS AI / 데이터 / 보안</text>

  <rect class="box" x="1180" y="205" width="320" height="95"/>
  <text class="label" x="1210" y="238">Amazon Transcribe Streaming</text>
  <text class="tiny" x="1210" y="263">한국어 실시간 전사</text>
  <text class="warn" x="1210" y="284">음성 원본 S3 저장 없음</text>

  <rect class="boxPink" x="1180" y="330" width="320" height="104"/>
  <text class="label" x="1210" y="363">Amazon Bedrock</text>
  <text class="tiny" x="1210" y="388">Nova Pro: extraction / onepaper review</text>
  <text class="tiny" x="1210" y="410">Nova Lite: patient guide rewriting</text>

  <rect class="boxPurple" x="1180" y="465" width="320" height="94"/>
  <text class="label" x="1210" y="498">Amazon Titan Embeddings</text>
  <text class="tiny" x="1210" y="523">Hybrid IR vector similarity</text>
  <text class="tiny" x="1210" y="545">BM25 + vector + label bridge</text>

  <rect class="boxGreen" x="1180" y="590" width="320" height="116"/>
  <text class="label" x="1210" y="623">DynamoDB</text>
  <text class="tiny" x="1210" y="648">MunjinSessions</text>
  <text class="tiny" x="1210" y="670">대기열, 상태, 마스킹 표시명</text>
  <text class="tiny" x="1210" y="692">S3 artifact key pointer</text>

  <rect class="boxGreen" x="1180" y="735" width="320" height="128"/>
  <text class="label" x="1210" y="768">S3 Artifact Bucket</text>
  <text class="tiny" x="1210" y="793">answers / onepaper / guide redacted JSON</text>
  <text class="tiny" x="1210" y="815">llm_trace 최소 설명 trace</text>
  <text class="tiny" x="1210" y="837">Lifecycle, KMS/SSE, Macie 감사 대상</text>

  <path class="arrow" d="M310 252 C360 252 360 290 410 290"/>
  <path class="arrow" d="M310 384 C360 384 360 440 410 440"/>
  <path class="arrow" d="M310 530 C360 530 360 290 410 290"/>
  <path class="arrow" d="M310 667 C360 667 360 290 410 290"/>
  <path class="arrow" d="M610 290 C660 290 660 245 720 245"/>
  <path class="arrow" d="M610 440 C820 420 990 235 1180 245"/>
  <path class="arrow" d="M885 291 L885 320"/>
  <path class="arrow" d="M885 412 L885 445"/>
  <path class="arrow" d="M885 691 L885 725"/>
  <path class="arrow" d="M1050 523 C1110 523 1120 383 1180 383"/>
  <path class="arrow" d="M1050 559 C1115 559 1120 510 1180 510"/>
  <path class="arrowGreen" d="M1050 622 C1115 622 1120 648 1180 648"/>
  <path class="arrowGreen" d="M1050 662 C1115 662 1120 800 1180 800"/>
  <path class="arrowGray" d="M1340 300 L1340 330"/>
  <path class="arrowGray" d="M1340 559 L1340 590"/>

  <rect class="box" x="70" y="790" width="1030" height="82"/>
  <text class="label" x="95" y="824">운영 원칙</text>
  <text class="tiny" x="95" y="850">음성 원본 저장 금지 · DynamoDB는 최소 상태만 · S3는 가명처리 artifact와 최소 trace · LLM 임의 점수 금지 · 의료 판단은 의료진이 수행</text>
</svg>
