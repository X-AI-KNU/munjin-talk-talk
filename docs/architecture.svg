<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .section { font: 700 18px Arial, sans-serif; fill: #232f3e; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #475569; }
      .icon { font: 700 20px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff" />
  <text x="800" y="48" text-anchor="middle" class="title">문진톡톡 MVP AWS 아키텍처</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">직원 접수 → 환자 태블릿 음성 문진 → STT → Bedrock 구조화 → 의사 원페이퍼 → 환자 안내문</text>

  <rect x="270" y="120" width="1280" height="800" fill="#ffffff" stroke="#4b5563" stroke-width="2" />
