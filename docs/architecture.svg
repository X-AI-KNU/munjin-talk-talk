  <rect x="1360" y="680" width="105" height="105" fill="#475569" stroke="#334155" />
  <text x="1412" y="733" class="icon" style="font-size:20px">Logs</text>
  <text x="1412" y="813" text-anchor="middle" class="label">CloudWatch Logs</text>
  <text x="1412" y="835" text-anchor="middle" class="small">Lambda 실행 로그</text>
  <text x="1412" y="855" text-anchor="middle" class="small">오류 추적</text>

  <rect x="360" y="680" width="255" height="90" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-dasharray="7 5" />
  <text x="488" y="713" text-anchor="middle" class="label">운영 전 추가 권장</text>
  <text x="488" y="738" text-anchor="middle" class="small">Cognito 또는 내부망/VPN으로</text>
  <text x="488" y="760" text-anchor="middle" class="small">직원 · 의사 화면 보호</text>

