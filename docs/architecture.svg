  <text x="120" y="355" text-anchor="middle" class="section">사용자</text>
  <circle cx="120" cy="410" r="28" fill="#ffffff" stroke="#111827" stroke-width="4" />
  <circle cx="85" cy="470" r="24" fill="#ffffff" stroke="#111827" stroke-width="4" />
  <circle cx="155" cy="470" r="24" fill="#ffffff" stroke="#111827" stroke-width="4" />
  <text x="120" y="535" text-anchor="middle" class="label">직원 · 환자 · 의료진</text>

  <rect x="350" y="40" width="250" height="75" rx="8" fill="#f8fafc" stroke="#334155" />
  <text x="475" y="68" text-anchor="middle" class="label">GitHub</text>
  <text x="475" y="91" text-anchor="middle" class="small">CHOIGIBUM/munjin-talk-talk-mvp</text>

  <rect x="360" y="210" width="96" height="96" fill="#8b5cf6" stroke="#6d28d9" />
  <text x="408" y="258" class="icon">Amplify</text>
  <text x="408" y="333" text-anchor="middle" class="label">AWS Amplify Hosting</text>
  <text x="408" y="354" text-anchor="middle" class="small">React + Vite 정적 웹 앱</text>
  <text x="408" y="374" text-anchor="middle" class="small">HTTPS / SPA rewrite</text>

  <rect x="330" y="430" width="225" height="155" rx="8" fill="#f5f3ff" stroke="#8b5cf6" />
  <text x="442" y="458" text-anchor="middle" class="label">프론트 화면</text>
