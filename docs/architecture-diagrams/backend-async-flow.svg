</text>
<text x="52" y="94" font-family="Noto Sans KR, Malgun Gothic, Segoe UI, sans-serif" font-size="17" font-weight="500" fill="#64748b" text-anchor="start">
<tspan x="52" dy="0">환자 UX는 빠르게 끝내고, AI 분석은 별도 작업으로 수행해 의료진 화면에 준비 상태를 표시합니다.</tspan>
</text>
