AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MunjinTokTok MVP serverless backend

# SAM/CloudFormation 배포 템플릿입니다.
# 프론트는 Amplify가 담당하고, 이 템플릿은 API Gateway + Lambda 연결과 환경 변수를 관리합니다.
Parameters:
  SessionsTableName:
    Type: String
    Default: MunjinSessions
    Description: Existing DynamoDB table name. Partition key must be session_id.
  ArtifactsBucketName:
    Type: String
    Description: Existing S3 bucket for pseudonymized questionnaire artifacts.
  LambdaRoleArn:
    Type: String
    Description: Existing IAM role ARN for the Lambda function.
  CustomVocabularyName:
    Type: String
    Default: ''
    Description: Optional Amazon Transcribe custom vocabulary name.
  CorsAllowOrigin:
    Type: String
    Default: '*'
    Description: Frontend HTTPS origin allowed to call the API. Use the Amplify branch domain for production-like tests.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        # 세션/STT/LLM/IR 설정은 Lambda 코드가 settings.py에서 읽습니다.
        SESSIONS_TABLE: !Ref SessionsTableName
        ARTIFACTS_BUCKET: !Ref ArtifactsBucketName
        CUSTOM_VOCABULARY: !Ref CustomVocabularyName
        ALLOWED_ORIGINS: !Ref CorsAllowOrigin
        STRONG_MODEL_ID: apac.amazon.nova-pro-v1:0
        LIGHT_MODEL_ID: apac.amazon.nova-lite-v1:0
        REVIEWER_MODEL_ID: apac.amazon.nova-pro-v1:0
        GUIDE_MODEL_ID: apac.amazon.nova-lite-v1:0
        MAX_LLM_TOKENS: '1600'
        REVIEW_MAX_TOKENS: '900'
        GUIDE_MAX_TOKENS: '900'
        EXTRACTION_RETRY_ATTEMPTS: '3'
        REVIEW_RETRY_ATTEMPTS: '2'
        EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
        EMBEDDING_DIMENSIONS: '512'
        HYBRID_TOP_K: '5'
        HYBRID_CANDIDATE_K: '24'
        HYBRID_ACCEPT_THRESHOLD: '0.18'
        HYBRID_BM25_WEIGHT: '0.35'
        HYBRID_VECTOR_WEIGHT: '0.65'
        HYBRID_MIN_VECTOR_SCORE: '0.12'
        HYBRID_MIN_BM25_SCORE: '0.04'
        HYBRID_MIN_LABEL_SCORE: '0.55'

Resources:
  # 프론트엔드가 호출하는 HTTP API Gateway입니다.
  MunjinHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # 모든 REST endpoint를 하나의 Lambda handler.py로 라우팅합니다.
  MunjinApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.handler
      Role: !Ref LambdaRoleArn
      Events:
        CreateSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions
            Method: POST
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}
            Method: GET
        StaffHelp:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}/staff-help
            Method: POST
        SaveConsent:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}/consent
            Method: POST
        TranscribeStreamUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /transcribe-stream-url
            Method: POST
        ProcessAnswer:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /process-answer
            Method: POST
        DoctorQueue:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /doctor/queue
            Method: GET
        OnePager:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /onepager/{session_id}
            Method: GET
        OnePagerReview:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /onepager/{session_id}/review
            Method: POST
        DoctorResponse:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /doctor-response
            Method: POST
        Guide:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /guide/{session_id}
            Method: GET

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint for VITE_API_BASE_URL
    Value: !Sub 'https://${MunjinHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
