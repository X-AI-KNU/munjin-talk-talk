AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MunjinTokTok MVP serverless backend

# SAM/CloudFormation 배포 템플릿입니다.
# 프론트는 Amplify가 담당하고, 이 템플릿은 API Gateway + Lambda 연결과 환경 변수를 관리합니다.
Parameters:
  SessionsTableName:
    Type: String
    Default: MunjinSessions
    Description: Existing DynamoDB table name. Partition key must be session_id.
  ArtifactsBucketName:
    Type: String
    Description: Existing S3 bucket for pseudonymized questionnaire artifacts.
  LambdaRoleArn:
    Type: String
    Description: Existing IAM role ARN for the Lambda function.
  CustomVocabularyName:
    Type: String
    Default: ''
    Description: Optional Amazon Transcribe custom vocabulary name.
  CorsAllowOrigin:
    Type: String
    Default: 'https://main.dv5herezqtt1t.amplifyapp.com'
    Description: Frontend HTTPS origin allowed to call the API. Use the Amplify branch domain for production-like tests.
  StaffAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Human-entered access code for staff login. Kept as this parameter name for backward-compatible deploy commands.
  DoctorAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Human-entered access code for doctor login. Kept as this parameter name for backward-compatible deploy commands.
  AuthSigningSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: HMAC signing secret for short-lived staff/doctor session tokens.
  AuthTokenTtlMinutes:
    Type: Number
    Default: 240
    Description: Staff/doctor role session token lifetime in minutes.
  S3KmsKeyId:
    Type: String
    Default: ''
    Description: Optional KMS key id or ARN for S3 artifact encryption. Empty value uses SSE-S3 AES256.
  DomainPack:
    Type: String
    Default: respiratory
    Description: Domain pack id under src/data/domain_packs.
  QuestionSet:
    Type: String
    Default: default
    Description: Question set id under src/data/question_sets.
  DialectPack:
    Type: String
    Default: dialect_kangwon
    Description: Dialect pack id under src/data/dialect_packs.
  DialectTopK:
    Type: Number
    Default: 8
    Description: Number of dialect RAG hints to retrieve.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        # 세션/STT/LLM/IR 설정은 Lambda 코드가 settings.py에서 읽습니다.
        SESSIONS_TABLE: !Ref SessionsTableName
        ARTIFACTS_BUCKET: !Ref ArtifactsBucketName
        CUSTOM_VOCABULARY: !Ref CustomVocabularyName
        ALLOWED_ORIGINS: !Ref CorsAllowOrigin
        STAFF_ACCESS_CODE: !Ref StaffAccessToken
        DOCTOR_ACCESS_CODE: !Ref DoctorAccessToken
        AUTH_SIGNING_SECRET: !Ref AuthSigningSecret
        AUTH_TOKEN_TTL_MINUTES: !Ref AuthTokenTtlMinutes
        S3_SERVER_SIDE_ENCRYPTION: AES256
        S3_KMS_KEY_ID: !Ref S3KmsKeyId
        DOMAIN_PACK: !Ref DomainPack
        QUESTION_SET: !Ref QuestionSet
        STRONG_MODEL_ID: apac.amazon.nova-pro-v1:0
        LIGHT_MODEL_ID: apac.amazon.nova-lite-v1:0
        REVIEWER_MODEL_ID: apac.amazon.nova-pro-v1:0
        GUIDE_MODEL_ID: apac.amazon.nova-lite-v1:0
        MAX_LLM_TOKENS: '1600'
        REVIEW_MAX_TOKENS: '900'
        GUIDE_MAX_TOKENS: '900'
        EXTRACTION_RETRY_ATTEMPTS: '3'
        REVIEW_RETRY_ATTEMPTS: '2'
        EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
        EMBEDDING_DIMENSIONS: '512'
        HYBRID_TOP_K: '5'
        HYBRID_CANDIDATE_K: '24'
        HYBRID_ACCEPT_THRESHOLD: '0.18'
        HYBRID_BM25_WEIGHT: '0.35'
        HYBRID_VECTOR_WEIGHT: '0.65'
        HYBRID_MIN_VECTOR_SCORE: '0.12'
        HYBRID_MIN_BM25_SCORE: '0.04'
        HYBRID_MIN_LABEL_SCORE: '0.55'
        DIALECT_PACK: !Ref DialectPack
        DIALECT_TOP_K: !Ref DialectTopK
        DIALECT_NORMALIZER_MODEL_ID: apac.amazon.nova-lite-v1:0
        DIALECT_MAX_TOKENS: '700'

Resources:
  # 프론트엔드가 호출하는 HTTP API Gateway입니다.
  MunjinHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Munjin-Access-Token
          - X-Munjin-Patient-Token
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # 모든 REST endpoint를 하나의 Lambda handler.py로 라우팅합니다.
  MunjinApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.handler
      Role: !Ref LambdaRoleArn
      Events:
        AuthLogin:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /auth/login
            Method: POST
        CreateSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions
            Method: POST
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}
            Method: GET
        StaffHelp:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}/staff-help
            Method: POST
        SaveConsent:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}/consent
            Method: POST
        TranscribeStreamUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /transcribe-stream-url
            Method: POST
        ProcessAnswer:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /process-answer
            Method: POST
        ProcessAnswers:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /process-answers
            Method: POST
        DoctorQueue:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /doctor/queue
            Method: GET
        QuestionSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /question-sets/{question_set_id}
            Method: GET
        OnePager:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /onepager/{session_id}
            Method: GET
        OnePagerReview:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /onepager/{session_id}/review
            Method: POST
        RetryAnalysis:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /sessions/{session_id}/analysis/retry
            Method: POST
        DoctorResponse:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /doctor-response
            Method: POST
        Guide:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /guide/{session_id}
            Method: GET

  MunjinApiSelfInvokePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: munjin-api-self-invoke
      Roles:
        - !Select [1, !Split ['/', !Ref LambdaRoleArn]]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: !GetAtt MunjinApiFunction.Arn

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint for VITE_API_BASE_URL
    Value: !Sub 'https://${MunjinHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
